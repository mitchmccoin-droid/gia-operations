plugins {
      id 'com.android.application'
  }
  android {
      namespace 'com.gia.operations'
      compileSdk 34
      defaultConfig {
          applicationId "com.gia.operations"
          minSdk 21
          targetSdk 34
          versionCode 1
          versionName "1.0"
      }
      buildTypes {
          release { minifyEnabled false }
          debug {}
      }
      compileOptions {
          sourceCompatibility JavaVersion.VERSION_1_8
          targetCompatibility JavaVersion.VERSION_1_8
      }
      packagingOptions {
          resources { excludes += ['META-INF/*'] }
      }
  }
  dependencies {}